        /**
         * RIPPLE CURSOR LOGIC
         */
        interface Ripple {
          id: string;
          x: number;
          y: number;
        }

        interface RippleCursorProps {
          maxSize?: number;
          duration?: number;
          blur?: boolean;
        }

        type RippleState = Ripple[];

        type RippleAction =
          | { type: 'ADD_RIPPLE'; payload: Ripple }
          | { type: 'REMOVE_RIPPLE'; payload: string };

        const rippleReducer = (state: RippleState, action: RippleAction): RippleState => {
          switch (action.type) {
            case 'ADD_RIPPLE':
              return [...state, action.payload].slice(-30);
            case 'REMOVE_RIPPLE':
              return state.filter((ripple) => ripple.id !== action.payload);
            default:
              return state;
          }
        };

        const RippleCursor: React.FC<RippleCursorProps> = ({
          maxSize = 50,
          duration = 1000,
          blur = true,
        }) => {
          const [ripples, dispatch] = useReducer(rippleReducer, []);

          const handleMouseMove = (e: MouseEvent): void => {
            const ripple: Ripple = {
              id: `${Date.now()}-${Math.random()}`,
              x: e.clientX,
              y: e.clientY,
            };
            dispatch({ type: 'ADD_RIPPLE', payload: ripple });
            setTimeout(() => {
              dispatch({ type: 'REMOVE_RIPPLE', payload: ripple.id });
            }, duration);
          };

          useEffect(() => {
            window.addEventListener('mousemove', handleMouseMove);
            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
            };
          }, [duration]);

          return (
            <div className='fixed top-0 left-0 w-screen h-screen pointer-events-none overflow-hidden z-[9999]'>
              {ripples.map((ripple) => (
                <div
                  key={ripple.id}
                  className='absolute rounded-full bg-blue-500 bg-opacity-50 shadow-[0_0_10px_rgba(0,150,255,0.7),0_0_20px_rgba(0,150,255,0.4)] animate-ripple'
                  style={{
                    left: `${ripple.x}px`,
                    top: `${ripple.y}px`,
                    width: `${maxSize}px`,
                    height: `${maxSize}px`,
                    animationDuration: `${duration}ms`,
                    filter: blur ? 'blur(4px)' : 'none',
                  }}
                />
              ))}
            </div>
          );
        };

                  <h1 
                    onClick={handleSecretClick}
                    className="text-5xl md:text-8xl font-bold uppercase tracking-tighter mb-12 select-none cursor-default active:text-gray-300 transition-colors"
                  >
                    Joesaboarchive
                  </h1>

                  <div className="flex flex-col md:flex-row gap-6">
                    <button 
                      onClick={() => setView('contents')}
                      className="px-8 py-3 border border-white text-xl uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-300"
                    >
                      view contents
                    </button>
                    <button 
                      onClick={() => setView('info')}
                      className="px-8 py-3 border border-white text-xl uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-300"
                    >
                      info
                    </button>
                  </div>
                </div>
              )}

              {/* Info Overlay (The Legend) */}
              {view === 'info' && (
                <div className="fixed inset-0 z-[100] bg-black overflow-y-auto p-8 md:p-20 animate-in slide-in-from-bottom duration-500">
                  <button 
                    onClick={() => setView('landing')}
                    className="fixed top-8 right-8 px-4 py-2 border border-white hover:bg-white hover:text-black transition-all text-2xl z-[110]"
                  >
                    BACK
                  </button>
                  
                  <div className="max-w-3xl mx-auto">
                    <h2 className="text-4xl md:text-6xl uppercase border-b border-white pb-4 mb-12">
                      THE LEGEND OF JOE SABO
                    </h2>
                    <div className="space-y-6 text-lg text-gray-400">
                      {bioParagraphs.map((para, i) => (
                        <p key={i}>{para}</p>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Contents View (10 Specific Items) */}
              {view === 'contents' && (
                <div className="fixed inset-0 z-[100] bg-black overflow-y-auto p-8 md:p-12 animate-in slide-in-from-right duration-500">
                  <div className="flex justify-between items-center max-w-6xl mx-auto mb-12 border-b border-gray-800 pb-4">
                    <h2 className="text-3xl md:text-5xl uppercase tracking-widest">Archive_Directory</h2>
                    <button 
                      onClick={() => setView('landing')}
                      className="px-4 py-2 border border-white hover:bg-white hover:text-black transition-all text-xl"
                    >
                      EXIT
                    </button>
                  </div>
                  
                  <div className="max-w-3xl mx-auto space-y-4">
                    {Object.keys(archiveContent).map((topic, index) => (
                      <div 
                        key={index}
                        onClick={() => handleTopicSelect(topic)}
                        className="group p-6 border border-gray-800 hover:border-white cursor-pointer transition-all flex justify-between items-center"
                      >
                        <div>
                          <div className="text-xs text-gray-600 mb-1">FILE_ID: {String(index + 1).padStart(3, '0')}</div>
                          <div className="text-2xl uppercase group-hover:pl-4 transition-all">{topic}</div>
                        </div>
                        <div className="text-gray-700 group-hover:text-white transition-all">{"[READ_ACCESS]"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Detail View (10 Paragraphs Documentation) */}
              {view === 'detail' && selectedTopic && (
                <div className="fixed inset-0 z-[150] bg-black overflow-y-auto p-8 md:p-20 animate-in zoom-in duration-300">
                  <button 
                    onClick={() => setView('contents')}
                    className="fixed top-8 right-8 px-4 py-2 border border-white hover:bg-white hover:text-black transition-all text-2xl z-[160]"
                  >
                    CLOSE_DOC
                  </button>
                  
                  <div className="max-w-3xl mx-auto">
                    <div className="text-blue-500 mb-2 uppercase tracking-widest">Archive_Entry_Secure</div>
                    <h2 className="text-4xl md:text-6xl uppercase border-b border-white pb-4 mb-12">
                      {selectedTopic}
                    </h2>
                    <div className="space-y-8 text-lg text-gray-300">
                      {archiveContent[selectedTopic].map((para, i) => (
                        <div key={i}>
                          <div className="text-xs text-gray-600 mb-2 uppercase font-bold">Protocol {i + 1}</div>
                          <p className="leading-relaxed">{para}</p>
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-20 border-t border-gray-800 pt-8 text-center text-gray-600 text-sm italic">
                        -- End of Document --
                        <br/>Joesabo Systems ver 10.1.0
                    </div>
                  </div>
                </div>
              )}

              {/* THE HIDDEN KEYPAD OVERLAY */}
              {view === 'keypad' && (
                <div className="fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center animate-in zoom-in duration-300 backdrop-blur-md">
                  <button 
                    onClick={() => setView('landing')}
                    className="absolute top-8 right-8 px-4 py-2 border border-gray-700 text-gray-400 hover:text-white hover:border-white transition-all text-xl"
                  >
                    CANCEL
                  </button>
                  
                  <div className="bg-gray-950 border border-gray-800 p-8 md:p-12 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col items-center">
                    <div className="mb-8 w-full text-center">
                      <div className="text-gray-500 text-sm tracking-[0.3em] mb-4 uppercase">Enter Auth Code</div>
                      <div className={`text-4xl md:text-5xl tracking-[0.5em] h-16 flex justify-center items-center font-bold ${keypadError ? 'text-red-500 animate-pulse' : 'text-blue-500'} bg-black/50 rounded-xl border border-gray-800 shadow-inner transition-colors`}>
                        {keypadInput.padEnd(4, '_').split('').map((char, i) => (
                          <span key={i} className="mx-2">{char === '_' ? '_' : '*'}</span>
                        ))}
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-4 md:gap-6">
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                        <button
                          key={num}
                          onClick={() => handleKeypadPress(num.toString())}
                          className="w-20 h-20 md:w-24 md:h-24 rounded-full border border-gray-800 bg-gray-900 hover:border-blue-500 hover:bg-blue-500/10 hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] text-3xl transition-all flex items-center justify-center active:scale-95 text-gray-300 hover:text-white"
                        >
                          {num}
                        </button>
                      ))}
                      <button
                        onClick={() => setKeypadInput(keypadInput.slice(0, -1))}
                        className="w-20 h-20 md:w-24 md:h-24 rounded-full border border-gray-800 bg-gray-900 hover:border-red-500 hover:bg-red-500/10 hover:shadow-[0_0_20px_rgba(239,68,68,0.5)] hover:text-red-500 text-lg transition-all flex items-center justify-center active:scale-95 uppercase tracking-wider text-gray-500"
                      >
                        DEL
                      </button>
                      <button
                        onClick={() => handleKeypadPress('0')}
                        className="w-20 h-20 md:w-24 md:h-24 rounded-full border border-gray-800 bg-gray-900 hover:border-blue-500 hover:bg-blue-500/10 hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] text-3xl transition-all flex items-center justify-center active:scale-95 text-gray-300 hover:text-white"
                      >
                        0
                      </button>
                      <div className="w-20 h-20 md:w-24 md:h-24"></div> {/* Empty space for layout balance */}
                    </div>
                  </div>
                </div>
              )}

              {/* THE HIDDEN PROXY SECTION (FORMERLY GAMES) */}
              {view === 'games' && (
                <div className="fixed inset-0 z-[200] bg-zinc-950 text-green-500 flex flex-col animate-in fade-in duration-1000">
                  <div className="crt-scanline z-50 pointer-events-none"></div>
                  
                  {/* Proxy Header / URL Bar */}
                  <div className="flex flex-col md:flex-row items-center justify-between p-4 border-b border-green-900 bg-black/90 z-40 gap-4">
                    <div className="flex items-center gap-4">
                      <span className="text-3xl animate-pulse">👾</span>
                      <h2 className="text-xl md:text-2xl uppercase tracking-widest font-bold hidden sm:block">
                        STEALTH_PROXY
                      </h2>
                    </div>

                    <form onSubmit={handleProxySubmit} className="flex-1 w-full max-w-3xl flex">
                      <input
                        type="text"
                        value={proxyUrlInput}
                        onChange={(e) => setProxyUrlInput(e.target.value)}
                        placeholder="Enter target URL (e.g. example.com)..."
                        className="w-full bg-green-950/20 border border-green-800 px-4 py-2 text-green-400 placeholder-green-800 focus:outline-none focus:border-green-500 font-mono"
                      />
                      <button 
                        type="submit" 
                        className="px-6 border border-green-800 border-l-0 hover:bg-green-600 hover:text-black font-bold transition-colors uppercase tracking-wider"
                      >
                        Init
                      </button>
                    </form>

                    <button 
                      onClick={() => {
                        setView('landing');
                        setIframeSrc('');
                        setProxyUrlInput('');
                      }}
                      className="px-4 py-2 border border-green-500 text-green-500 hover:bg-green-500 hover:text-black transition-all font-bold uppercase tracking-wider"
                    >
                      Terminate
                    </button>
                  </div>

                  {/* Iframe Viewport Area */}
                  <div className="flex-1 bg-black relative w-full h-full">
                    {iframeSrc ? (
                      <iframe 
                        src={iframeSrc} 
                        className="w-full h-full border-none bg-white"
                        sandbox="allow-same-origin allow-scripts allow-forms"
                        title="Proxy Viewport"
                      ></iframe>
                    ) : (
                      <div className="absolute inset-0 flex items-center justify-center flex-col opacity-50 bg-[radial-gradient(circle,rgba(0,255,0,0.05)_0%,transparent_70%)]">
                        <p className="text-2xl md:text-4xl mb-4 uppercase tracking-widest font-bold drop-shadow-[0_0_8px_rgba(0,255,0,0.5)]">
                          &gt; PROXY_SYSTEM_READY
                        </p>
                        <p className="text-lg md:text-xl font-mono text-green-700">
                          &gt; AWAITING TARGET URL INPUT...
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
