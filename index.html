        .retro-font {

        }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(18, 16, 16, 0.05);
            z-index: 49;
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 1.0; }
            100% { opacity: 0.9; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border: 2px solid #000;
        }

        .glitch {
            position: relative;
        }
        .glitch:hover {
            text-shadow: 2px 0 red, -2px 0 blue;
        }

        .archive-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .archive-item:hover {
            background-color: var(--neon-green);
            color: black;
            transform: translateX(10px);
        }

        .active-item {
            background-color: var(--neon-green);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* Loader */
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
        }

            {

                title: "026: Best Pasta Shape",

                    <p>Do not argue with me. Penne is boring. Spaghetti is messy.</p>

                    <p><strong>Scientific reason:</strong> The T-Rex shape holds more cheese sauce in its tiny arms.</p>

            },
            {
                id: 27,
                title: "027: Why Printers Smell Fear",
                icon: "fa-print",
                content: `

                    <p>Printers are sentient. They know when you are in a rush.</p>

                    <div class="bg-black border border-green-500 p-4 font-mono text-green-500 mt-2">
                        > User is relaxed? -> Print perfectly.<br>
                        > User is late for meeting? -> JAM PAPER.<br>
                        > User needs black and white doc? -> CYAN LEVEL LOW. CANNOT PRINT.
                    </div>

            {
                id: 28,
                title: "028: Legend of Left Sock",
                icon: "fa-socks",
                content: `

                    <p>Somewhere, in a parallel dimension, there is a mountain of left socks. They have formed a society. They have a king (it's an Argyle one).</p>
                `
            },
            {
                id: 29,
                title: "029: Facts About Dirt",
                icon: "fa-mountain",
                content: `
                    <h2 class="text-4xl text-[#39ff14] mb-6">DIRT: A REVIEW</h2>
                    <p>1. It is brown (usually).</p>
                    <p>2. Worms love it.</p>
                    <p>3. It is older than your grandma.</p>
                    <p>4. If you get it wet, it becomes mud. This is alchemy.</p>
                    <p>5. Don't eat it (See entry #011).</p>
                `
            },
            {
                id: 30,
                title: "030: The End of Internet",
                icon: "fa-skull",
                content: `
                    <h2 class="text-4xl text-[#39ff14] mb-6">YOU REACHED THE END</h2>
                    <p>This is the last page of the internet. There is nothing left to scroll.</p>
                    <p class="mt-8 text-center text-6xl">GO OUTSIDE.</p>
                    <div class="mt-12 text-center">
                        <button onclick="window.location.reload()" class="bg-red-600 text-white p-4 rounded hover:bg-red-700">RESET SIMULATION</button>
                    </div>
                `

        ];

        // --- APP LOGIC ---

        const navList = document.getElementById('nav-list');
        const contentDisplay = document.getElementById('content-display');
        const searchInput = document.getElementById('searchInput');
        const filePath = document.getElementById('file-path');
        const loader = document.getElementById('loader');
        const loadingBar = document.getElementById('loading-bar');

        // Initialize
        function init() {
            // Render Nav
            renderNav(archiveData);

            // Fake Loading Sequence
            setTimeout(() => { loadingBar.style.width = "30%"; }, 200);
            setTimeout(() => { loadingBar.style.width = "70%"; }, 600);
            setTimeout(() => { loadingBar.style.width = "100%"; }, 1200);
            setTimeout(() => { 
                loader.style.opacity = "0";
                setTimeout(() => { loader.style.display = "none"; }, 500);
            }, 1500);

            // Load Home
            loadPage(0);
        }

        // Render Sidebar Items
        function renderNav(items) {
            navList.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'archive-item p-3 mb-1 border-l-2 border-[#333] text-gray-400 text-sm font-mono flex items-center group';
                div.id = `nav-${item.id}`;
                div.onclick = () => loadPage(item.id);
                div.innerHTML = `
                    <i class="fas ${item.icon} w-6 text-center mr-3 group-hover:text-black"></i>
                    <span class="truncate">${item.title}</span>
                `;
                navList.appendChild(div);
            });
        }

        // Load Content
        function loadPage(id) {
            const page = archiveData.find(p => p.id === id);
            if (!page) return;

            // Update UI
            document.querySelectorAll('.archive-item').forEach(el => el.classList.remove('active-item', 'border-[#39ff14]'));
            const activeNav = document.getElementById(`nav-${id}`);
            if(activeNav) {
                activeNav.classList.add('active-item', 'border-[#39ff14]');
                activeNav.scrollIntoView({behavior: "smooth", block: "center"});
            }

            // Update Content with slight glitch effect
            contentDisplay.style.opacity = '0';
            contentDisplay.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                contentDisplay.innerHTML = page.content;
                contentDisplay.style.opacity = '1';
                contentDisplay.style.transform = 'translateY(0)';
                filePath.innerText = `/root/joesabo/secrets/${page.title.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase()}.log`;
            }, 150);
        }

        // Random Button
        function randomPage() {
            const randomIndex = Math.floor(Math.random() * (archiveData.length - 1)) + 1; // Skip home (0)
            loadPage(randomIndex);
        }

        // Search Function
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = archiveData.filter(item => item.title.toLowerCase().includes(term) || item.content.toLowerCase().includes(term));
            
            // Re-render nav but keep IDs intact
            navList.innerHTML = '';
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'archive-item p-3 mb-1 border-l-2 border-[#333] text-gray-400 text-sm font-mono flex items-center group';
                div.id = `nav-${item.id}`;
                div.onclick = () => loadPage(item.id);
                div.innerHTML = `
                    <i class="fas ${item.icon} w-6 text-center mr-3 group-hover:text-black"></i>
                    <span class="truncate">${item.title}</span>
                `;
                navList.appendChild(div);
            });

            if (filtered.length === 0) {
                navList.innerHTML = `<div class="p-4 text-red-500 text-xs">NO FILES FOUND. TRY "CHEESE".</div>`;
            }
        });

        // Run
        window.onload = init;

    </script>
</body>
</html>
